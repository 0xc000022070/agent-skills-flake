name: Update Sources

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Nix
        uses: cachix/install-nix-action@v27

      - name: Configure Git
        run: |
          git config user.name "skills-updater[bot]"
          git config user.email "skills-updater[bot]@users.noreply.github.com"

      - name: Sync providers
        run: nix develop --command bun scripts/sync-providers.ts

      - name: Commit
        run: |
          if ! git diff --quiet sources.json; then
            git add sources.json
            git commit -m "chore: sync official providers"
            git push
          fi
