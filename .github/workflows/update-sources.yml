name: Update Sources

# Run every 12 hours at midnight and noon UTC
on:
  schedule:
    - cron: "0 0,12 * * *"
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Set up git
        run: |
          git config --global user.name "skills-updater[bot]"
          git config --global user.email "skills-updater[bot]@users.noreply.github.com"

      - name: Sync official providers
        run: |
          chmod +x scripts/sync-official-providers.ts
          bun scripts/sync-official-providers.ts

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet sources.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "## Sources Updated" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following changes were made:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            git diff sources.json | head -50 >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Repository count: $(jq '.providers.official | map(length) | add' sources.json)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add sources.json
          git commit -m "chore: sync official skill providers
          git push origin main

      - name: Create pull request (optional)
        if: steps.changes.outputs.changed == 'true' && github.event_name == 'schedule'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: update sources (automated)"
          title: "chore: update sources (automated)"
          body: |
            ## Sources Updated

            Repository metadata has been refreshed from skills.sh.

            ### Summary
            - Organizations: $(jq '.providers.official | length' sources.json)
            - Repositories: $(jq '.providers.official | map(length) | add' sources.json)
            - Updated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          branch: automated/update-sources
          delete-branch: true
          labels: "automation"
        continue-on-error: true # Don't fail if PR creation fails
